name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

# Cancel in-flight runs for the same branch when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Go vet + unit tests ─────────────────────────────────────────────────
  test:
    name: Test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.25"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Verify module consistency
        run: |
          go mod verify
          go mod tidy
          git diff --exit-code go.sum go.mod

      - name: go vet
        run: go vet ./...

      - name: go test (race detector)
        run: go test -race -count=1 -timeout=120s ./...

  # ── 2. Cross-compile release binary ───────────────────────────────────────
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w \
              -X main.version=${{ github.ref_name }} \
              -X main.commit=${{ github.sha }}" \
            -o dns-edge-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/dns-edge

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dns-edge-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dns-edge-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 7

  # ── 3. Docker build + size check ──────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: dns-edge:ci
          # Export to docker daemon so we can inspect the size
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Report and gate image size
        run: |
          SIZE=$(docker image inspect dns-edge:ci --format='{{.Size}}')
          MB=$(echo "scale=2; $SIZE/1024/1024" | bc)
          echo "Image size (uncompressed): ${MB} MB"
          echo "Note: registry-compressed image is typically 35-50% smaller."
          # Gate: uncompressed image must stay under 100 MB.
          # (Binary ~35 MB statically linked + certs + tzdata ≈ 37 MB total)
          python3 -c "import sys; mb=float('${MB}'); sys.exit(1 if mb > 100 else 0)" \
            || { echo "::error::Image size ${MB} MB exceeds 100 MB gate"; exit 1; }
